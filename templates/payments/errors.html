{% extends "layouts/users.html" %} {% load humanize %}
<!--  -->
{% block title %} Payments {% endblock title %}
<!--  -->
{% block content %}

<style>
  .main.payment-status {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }

  .ps-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Status card ── */
  .ps-card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #f3f4f6;
    padding: 40px 32px;
    text-align: center;
  }

  /* Icon circle */
  .ps-icon-wrap {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 20px;
  }
  .ps-icon-wrap.success {
    background: #e6f8f2;
    color: #00a878;
  }
  .ps-icon-wrap.failed {
    background: #fef0ec;
    color: #e85d35;
  }
  .ps-icon-wrap.pending {
    background: #fffbeb;
    color: #d97706;
  }

  .ps-title {
    font-size: 22px;
    font-weight: 800;
    color: #111;
    margin-bottom: 8px;
  }
  .ps-sub {
    font-size: 14px;
    color: #6b7280;
    line-height: 1.7;
    margin-bottom: 24px;
  }

  /* ── Transaction detail rows ── */
  .ps-details {
    background: #f9fafb;
    border-radius: 12px;
    padding: 16px;
    text-align: left;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .ps-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 13px;
  }
  .ps-row:last-child {
    border-bottom: none;
  }
  .ps-key {
    color: #9ca3af;
    font-weight: 500;
  }
  .ps-val {
    font-weight: 700;
    color: #111;
    text-align: right;
  }
  .ps-val.mono {
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .ps-val.green {
    color: #00a878;
  }
  .ps-val.red {
    color: #e85d35;
  }
  .ps-val.amber {
    color: #d97706;
  }

  /* Status badge inline */
  .ps-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .ps-badge::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ps-badge.completed {
    background: #e6f8f2;
    color: #00a878;
  }
  .ps-badge.completed::before {
    background: #00a878;
  }
  .ps-badge.failed {
    background: #fef0ec;
    color: #e85d35;
  }
  .ps-badge.failed::before {
    background: #e85d35;
  }
  .ps-badge.pending {
    background: #fffbeb;
    color: #d97706;
  }
  .ps-badge.pending::before {
    background: #d97706;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.3;
    }
  }

  /* ── CTA buttons ── */
  .ps-btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 50px;
    background: #e85d35;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
    margin-bottom: 10px;
  }
  .ps-btn-primary:hover {
    opacity: 0.88;
  }
  .ps-btn-primary i {
    font-size: 18px;
  }

  .ps-btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 46px;
    background: #fff;
    color: #374151;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }
  .ps-btn-secondary:hover {
    border-color: #e85d35;
    color: #e85d35;
  }
  .ps-btn-secondary i {
    font-size: 17px;
  }

  /* ── Info box (pending note) ── */
  .ps-info {
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 10px;
    padding: 13px 16px;
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: #92400e;
    line-height: 1.7;
    text-align: left;
  }
  .ps-info i {
    font-size: 16px;
    color: #f59e0b;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── Responsive ── */
  @media (max-width: 960px) {
    .main.payment-status {
      margin-left: 0 !important;
      padding: 20px 16px 100px;
      align-items: flex-start;
    }
  }
</style>

<main class="main payment-status">
  <div class="ps-wrap">
    <!-- ══ FAILED ══ -->
    <div class="ps-card">
      <div class="ps-icon-wrap failed">
        <i class="ti ti-circle-x"></i>
      </div>
      <div class="ps-title">Payment Failed</div>
      <div class="ps-sub">
        This may happen due to a network issue or interrupted redirect.
      </div>
    </div>
  </div>
</main>

{% endblock content %}
